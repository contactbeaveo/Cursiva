<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page introuvable | Cursiva</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #16161f 50%, #0a0a0f 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background orbs */
        .orb1, .orb2 {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: pulse 4s ease-in-out infinite;
        }
        
        .orb1 {
            top: 25%;
            left: 25%;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        }
        
        .orb2 {
            bottom: 25%;
            right: 25%;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            animation-delay: 2s;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.2; }
        }
        
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 800px;
        }
        
        .number {
            font-size: clamp(120px, 20vw, 280px);
            font-weight: bold;
            line-height: 1;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease-out;
        }
        
        h1 {
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-out 0.2s backwards;
        }
        
        p {
            font-size: clamp(16px, 3vw, 20px);
            color: #9ca3af;
            margin-bottom: 40px;
            line-height: 1.6;
            animation: fadeIn 0.5s ease-out 0.4s backwards;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease-out 0.6s backwards;
        }
        
        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(6, 182, 212, 0.5);
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            border: none;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #0891b2 0%, #2563eb 100%);
            border: none;
        }
        
        .contact {
            margin-top: 40px;
            color: #6b7280;
            font-size: 16px;
            animation: fadeIn 0.5s ease-out 0.8s backwards;
        }
        
        .contact a {
            color: #06b6d4;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .contact a:hover {
            color: #0891b2;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 640px) {
            .glass-card {
                padding: 30px 20px;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="orb1"></div>
    <div class="orb2"></div>
    
    <div class="container">
        <div class="number">404</div>
        
        <h1>Oups ! Page introuvable</h1>
        
        <p>
            La page que vous recherchez n'existe pas ou a été déplacée.<br>
            Pas de panique, nous allons vous aider à retrouver votre chemin !
        </p>
        
        <div class="glass-card">
            <div class="buttons">
                <a href="/" class="btn btn-primary">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    Retour à l'accueil
                </a>
                
                <a href="/services" class="btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    Nos services
                </a>
                
                <a href="/contact" class="btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    Nous contacter
                </a>
            </div>
        </div>
        
        <div class="contact">
            Besoin d'aide ?<br>
            <a href="tel:5814467277">581 446 7277</a> •
            <a href="mailto:contact@cursiva.ca">contact@cursiva.ca</a>
        </div>
    </div>
    
    <script>
        // Redirect to React app if SPA routing is available
        if (window.history && window.history.pushState) {
            // Check if we're in a browser that supports history API
            setTimeout(function() {
                // Optional: uncomment to auto-redirect to home after 5 seconds
                // window.location.href = '/';
            }, 5000);
        }
    </script>
</body>
</html>
