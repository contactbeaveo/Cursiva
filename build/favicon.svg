<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#0099e6"/>
      <stop offset="100%" stop-color="#005bb5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#0077cc"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="#00ccff" stroke-width="4" opacity="0.15"/>
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)"/>

  <!-- Letter C bold arc -->
  <path d="M370 180
           C340 130 290 105 240 110
           C160 118 100 185 100 260
           C100 335 160 400 240 405
           C295 409 345 380 375 330"
        stroke="white"
        stroke-width="62"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow)"/>

  <!-- Inner highlight on C -->
  <path d="M370 180
           C340 130 290 105 240 110
           C160 118 100 185 100 260
           C100 335 160 400 240 405
           C295 409 345 380 375 330"
        stroke="rgba(255,255,255,0.3)"
        stroke-width="20"
        stroke-linecap="round"
        fill="none"/>

  <!-- Arrow cursor (white with dark shadow) -->
  <g transform="translate(295, 280)">
    <polygon points="0,0 0,90 22,70 36,105 50,99 36,64 62,64" fill="#1a1a2e" opacity="0.4" transform="translate(4,6)"/>
    <polygon points="0,0 0,90 22,70 36,105 50,99 36,64 62,64" fill="white"/>
    <polygon points="0,0 0,90 22,70 36,105 50,99 36,64 62,64" fill="rgba(255,255,255,0.15)" transform="translate(-2,-3)"/>
  </g>
</svg>
